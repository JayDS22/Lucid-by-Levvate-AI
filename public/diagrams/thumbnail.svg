<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" font-family="'Manrope', 'Helvetica Neue', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#141B5C"/>
      <stop offset="55%" stop-color="#1E2A8A"/>
      <stop offset="100%" stop-color="#0E1547"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.7" cy="0.4" r="0.55">
      <stop offset="0%" stop-color="#D8D9F2" stop-opacity="0.32"/>
      <stop offset="60%" stop-color="#1E2A8A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D8D9F2"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#glow)"/>

  <!-- Top brand strip -->
  <text x="64" y="68" fill="#D8D9F2" font-size="14" font-weight="700" letter-spacing="3">
    LUCID  ·  CLARITY ENGINE FOR LEVVATE
  </text>
  <line x1="64" y1="84" x2="220" y2="84" stroke="#D8D9F2" stroke-width="1" opacity="0.5"/>

  <!-- Six-blade aperture mark, top-left -->
  <g transform="translate(120, 208)">
    <!-- Outer ring -->
    <circle r="72" fill="none" stroke="#D8D9F2" stroke-width="2" opacity="0.4"/>
    <circle r="78" fill="none" stroke="#D8D9F2" stroke-width="0.75" opacity="0.25"/>

    <!-- Six aperture blades, rotated around center -->
    <g fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round">
      <g><polygon points="0,-66 57,-33 0,0" opacity="0.95"/></g>
      <g transform="rotate(60)"><polygon points="0,-66 57,-33 0,0" opacity="0.95"/></g>
      <g transform="rotate(120)"><polygon points="0,-66 57,-33 0,0" opacity="0.95"/></g>
      <g transform="rotate(180)"><polygon points="0,-66 57,-33 0,0" opacity="0.95"/></g>
      <g transform="rotate(240)"><polygon points="0,-66 57,-33 0,0" opacity="0.95"/></g>
      <g transform="rotate(300)"><polygon points="0,-66 57,-33 0,0" opacity="0.95"/></g>
    </g>

    <!-- Center hexagon (the iris opening) -->
    <polygon points="0,-14 12,-7 12,7 0,14 -12,7 -12,-7" fill="#FFFFFF"/>
  </g>

  <!-- LEFT: Wordmark + tagline -->
  <g>
    <text x="64" y="396" fill="#FFFFFF" font-size="168" font-weight="800" letter-spacing="-6">Lucid</text>
    <text x="68" y="464" fill="#D8D9F2" font-size="40" font-weight="400" font-style="italic" font-family="'Instrument Serif', 'Times New Roman', serif">
      clarity, scored.
    </text>

    <!-- Subline -->
    <text x="68" y="540" fill="#FFFFFF" font-size="26" font-weight="600" opacity="0.92">
      Paste a URL. Get a 1-10 score,
    </text>
    <text x="68" y="576" fill="#FFFFFF" font-size="26" font-weight="600" opacity="0.92">
      a 5-dimension rubric, three concrete edits.
    </text>
  </g>

  <!-- RIGHT: Score card -->
  <g transform="translate(760, 168)">
    <!-- Card background -->
    <rect x="0" y="0" width="456" height="384" rx="20" fill="#FFFFFF" opacity="0.06"/>
    <rect x="0" y="0" width="456" height="384" rx="20" fill="none" stroke="#D8D9F2" stroke-width="1.5" opacity="0.45"/>

    <!-- Card label -->
    <text x="32" y="48" fill="#D8D9F2" font-size="13" font-weight="700" letter-spacing="3">CLARITY SCORE</text>

    <!-- Big score -->
    <text x="32" y="184" fill="#FFFFFF" font-size="160" font-weight="800" letter-spacing="-6">8.4</text>
    <text x="252" y="184" fill="#D8D9F2" font-size="40" font-weight="500">/ 10</text>

    <!-- Rubric bars -->
    <g transform="translate(32, 220)">
      <!-- Row 1 -->
      <text x="0" y="14" fill="#FFFFFF" font-size="13" font-weight="600" opacity="0.92">Value proposition</text>
      <rect x="0" y="22" width="392" height="6" rx="3" fill="#FFFFFF" opacity="0.18"/>
      <rect x="0" y="22" width="352" height="6" rx="3" fill="url(#bar)"/>

      <!-- Row 2 -->
      <text x="0" y="56" fill="#FFFFFF" font-size="13" font-weight="600" opacity="0.92">Audience clarity</text>
      <rect x="0" y="64" width="392" height="6" rx="3" fill="#FFFFFF" opacity="0.18"/>
      <rect x="0" y="64" width="352" height="6" rx="3" fill="url(#bar)"/>

      <!-- Row 3 -->
      <text x="0" y="98" fill="#FFFFFF" font-size="13" font-weight="600" opacity="0.92">CTA strength</text>
      <rect x="0" y="106" width="392" height="6" rx="3" fill="#FFFFFF" opacity="0.18"/>
      <rect x="0" y="106" width="313" height="6" rx="3" fill="url(#bar)"/>

      <!-- Row 4 -->
      <text x="0" y="140" fill="#FFFFFF" font-size="13" font-weight="600" opacity="0.92">Jargon level</text>
      <rect x="0" y="148" width="392" height="6" rx="3" fill="#FFFFFF" opacity="0.18"/>
      <rect x="0" y="148" width="352" height="6" rx="3" fill="url(#bar)"/>
    </g>
  </g>

  <!-- Bottom mark -->
  <g transform="translate(64, 656)">
    <text fill="#D8D9F2" font-size="14" font-weight="600" letter-spacing="2" opacity="0.85">
      BUILT WITH NEXT.JS  ·  CLAUDE SONNET 4.5  ·  60 MIN BUILD
    </text>
  </g>

  <!-- Bottom-right accent shimmer line -->
  <line x1="760" y1="612" x2="1216" y2="612" stroke="#D8D9F2" stroke-width="1" opacity="0.35"/>
  <text x="1216" y="656" fill="#D8D9F2" font-size="13" font-weight="700" letter-spacing="3" text-anchor="end" opacity="0.8">
    LEVVATE.COM SCORED LIVE →
  </text>
</svg>
